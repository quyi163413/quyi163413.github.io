<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPTV 智能管理面板</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #1a1d20; color: #e9ecef; }
        .sidebar { position: fixed; top: 0; bottom: 0; left: 0; z-index: 100; padding: 0; box-shadow: inset -1px 0 0 rgba(0,0,0,.1); overflow-y: auto; width: 220px; background-color: #212529; }
        .sidebar .nav-link { color: #adb5bd; padding: 0.75rem 1rem; font-weight: 500; border-left: 3px solid transparent; }
        .sidebar .nav-link:hover, .sidebar .nav-link.active { color: #fff; background-color: #2b3035; border-left-color: #0d6efd; }
        .sidebar .nav-link i { width: 1.5rem; }
        main { margin-left: 220px; padding: 1rem; }
        .card { background-color: #2b3035; border: 1px solid #3d444b; border-radius: 0.5rem; margin-bottom: 1.5rem; }
        .card-header { background-color: #343a40; border-bottom: 1px solid #3d444b; font-weight: 600; }
        .stat-number { font-size: 2.5rem; font-weight: 700; color: #0d6efd; }
        .table { color: #e9ecef; }
        .table th { border-bottom: 2px solid #3d444b; color: #adb5bd; }
        @media (max-width: 768px) { .sidebar { position: relative; width: 100%; height: auto; } main { margin-left: 0; } }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <!-- 侧边栏 -->
            <nav id="sidebar" class="col-md-3 col-lg-2 d-md-block bg-dark sidebar" style="width:220px;">
                <div class="position-sticky pt-3">
                    <h5 class="text-white text-center py-3 border-bottom border-secondary">
                        <i class="fas fa-satellite-dish me-2"></i>IPTV 管理
                    </h5>
                    <ul class="nav flex-column">
                        <li class="nav-item"><a class="nav-link active" href="#" data-page="dashboard"><i class="fas fa-tachometer-alt me-2"></i>仪表盘</a></li>
                        <li class="nav-item"><a class="nav-link" href="#" data-page="channels"><i class="fas fa-list me-2"></i>频道列表</a></li>
                        <li class="nav-item"><a class="nav-link" href="#" data-page="fixed"><i class="fas fa-thumbtack me-2"></i>固定源管理</a></li>
                        <li class="nav-item"><a class="nav-link" href="#" data-page="config"><i class="fas fa-cog me-2"></i>配置管理</a></li>
                        <li class="nav-item"><a class="nav-link" href="#" data-page="quality"><i class="fas fa-chart-line me-2"></i>质量趋势</a></li>
                    </ul>
                    <hr class="border-secondary">
                    <div class="text-center text-muted small" id="last-update">更新于: --</div>
                </div>
            </nav>

            <!-- 主内容 -->
            <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4" style="margin-left:220px;">
                <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
                    <h1 class="h2" id="page-title">仪表盘</h1>
                    <button class="btn btn-sm btn-outline-secondary" id="refresh-btn"><i class="fas fa-sync-alt me-1"></i>刷新</button>
                </div>
                <div id="page-content">
                    <div class="text-center text-muted py-5">加载中...</div>
                </div>
            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // ========== 简化的前端逻辑（直接嵌入 HTML，避免外部 JS 加载失败） ==========
        const API_BASE = '/api';

        document.addEventListener('DOMContentLoaded', function() {
            // 导航切换
            document.querySelectorAll('.nav-link[data-page]').forEach(link => {
                link.addEventListener('click', function(e) {
                    e.preventDefault();
                    document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
                    this.classList.add('active');
                    loadPage(this.dataset.page);
                });
            });
            document.getElementById('refresh-btn').addEventListener('click', function() {
                const active = document.querySelector('.nav-link.active');
                loadPage(active ? active.dataset.page : 'dashboard');
            });
            loadPage('dashboard');
        });

        async function loadPage(page) {
            const content = document.getElementById('page-content');
            const title = document.getElementById('page-title');
            try {
                switch(page) {
                    case 'dashboard': title.textContent = '📊 仪表盘'; await renderDashboard(content); break;
                    case 'channels': title.textContent = '📋 频道列表'; await renderChannels(content); break;
                    case 'fixed': title.textContent = '📌 固定源管理'; await renderFixed(content); break;
                    case 'config': title.textContent = '⚙️ 配置管理'; renderConfig(content); break;
                    case 'quality': title.textContent = '📈 质量趋势'; await renderQuality(content); break;
                    default: content.innerHTML = '<div class="alert alert-warning">页面未找到</div>';
                }
            } catch(e) {
                content.innerHTML = `<div class="alert alert-danger">加载失败: ${e.message}</div>`;
                console.error(e);
            }
        }

        // ===== 仪表盘 =====
        async function renderDashboard(container) {
            const resp = await fetch(`${API_BASE}/status`);
            const data = await resp.json();
            container.innerHTML = `
                <div class="row">
                    <div class="col-md-3 mb-3"><div class="card"><div class="card-body text-center"><h6 class="text-muted">稳定源</h6><div class="stat-number">${data.stable_count || 0}</div></div></div></div>
                    <div class="col-md-3 mb-3"><div class="card"><div class="card-body text-center"><h6 class="text-muted">固定源</h6><div class="stat-number">${data.fixed_count || 0}</div></div></div></div>
                    <div class="col-md-3 mb-3"><div class="card"><div class="card-body text-center"><h6 class="text-muted">源池总量</h6><div class="stat-number">${data.pool_total || 0}</div></div></div></div>
                    <div class="col-md-3 mb-3"><div class="card"><div class="card-body text-center"><h6 class="text-muted">候选观察中</h6><div class="stat-number">${data.candidate_observing || 0}</div></div></div></div>
                </div>
                <div class="card"><div class="card-header">系统信息</div><div class="card-body"><p><strong>最后运行时间：</strong>${data.last_run || '暂无'}</p><p><strong>系统状态：</strong><span class="badge bg-success">运行中</span></p></div></div>
            `;
            document.getElementById('last-update').textContent = '更新于: ' + new Date().toLocaleString();
        }

        // ===== 频道列表 =====
        async function renderChannels(container) {
            const resp = await fetch(`${API_BASE}/channels`);
            const channels = await resp.json();
            if(!channels.length) {
                container.innerHTML = '<div class="alert alert-info">暂无频道</div>';
                return;
            }
            let html = `<div class="table-responsive"><table class="table table-hover"><thead><tr><th>频道名</th><th>分类</th><th>延迟(ms)</th><th>固定</th></tr></thead><tbody>`;
            channels.forEach(ch => {
                html += `<tr><td><strong>${ch.name}</strong></td><td><span class="badge bg-secondary">${ch.category || '其他'}</span></td><td>${ch.latency || '--'}</td><td>${ch.is_fixed ? '<span class="badge bg-primary">固定</span>' : '<span class="badge bg-secondary">普通</span>'}</td></tr>`;
            });
            html += '</tbody></table></div>';
            container.innerHTML = html;
        }

        // ===== 固定源管理 =====
        async function renderFixed(container) {
            const resp = await fetch(`${API_BASE}/fixed_sources`);
            const data = await resp.json();
            let entries = Object.entries(data);
            let html = `<div class="card"><div class="card-header">固定源列表</div><div class="card-body">`;
            if(!entries.length) {
                html += '<p class="text-muted">暂无固定源</p>';
            } else {
                html += `<ul class="list-group">`;
                entries.forEach(([name, url]) => {
                    html += `<li class="list-group-item d-flex justify-content-between align-items-center bg-dark text-white border-secondary"><span><strong>${name}</strong> <code class="text-muted">${url}</code></span></li>`;
                });
                html += `</ul>`;
            }
            html += '</div></div>';
            container.innerHTML = html;
        }

        // ===== 配置管理 =====
        function renderConfig(container) {
            container.innerHTML = `<div class="card"><div class="card-header">系统配置</div><div class="card-body"><p class="text-muted">配置管理功能正在开发中，请通过 .env 文件配置。</p><pre class="bg-dark text-light p-3 rounded">MAX_WORKERS=20\nTIMEOUT=8\nFFMPEG_ENABLE=true\nCACHE_HOURS=24</pre></div></div>`;
        }

        // ===== 质量趋势 =====
        async function renderQuality(container) {
            container.innerHTML = `
                <div class="row mb-3">
                    <div class="col-md-4"><input type="text" class="form-control" id="quality-input" placeholder="输入频道名"></div>
                    <div class="col-md-2"><button class="btn btn-primary" id="quality-btn">查看趋势</button></div>
                </div>
                <div class="card"><div class="card-header" id="quality-title">请选择频道</div><div class="card-body"><canvas id="quality-chart" height="250"></canvas></div></div>
            `;
            document.getElementById('quality-btn').addEventListener('click', async function() {
                const name = document.getElementById('quality-input').value.trim();
                if(!name) return;
                try {
                    const resp = await fetch(`${API_BASE}/quality/${encodeURIComponent(name)}?days=7`);
                    const data = await resp.json();
                    if(!data || !data.length) {
                        document.getElementById('quality-title').textContent = `"${name}" 暂无数据`;
                        return;
                    }
                    document.getElementById('quality-title').textContent = `"${name}" 延迟趋势 (最近7天)`;
                    const labels = data.map(d => new Date(d.timestamp).toLocaleDateString());
                    const values = data.map(d => d.latency || 0);
                    const ctx = document.getElementById('quality-chart').getContext('2d');
                    new Chart(ctx, {
                        type: 'line',
                        data: { labels: labels, datasets: [{ label: '延迟 (ms)', data: values, borderColor: '#0d6efd', tension: 0.2 }] },
                        options: { responsive: true, plugins: { legend: { labels: { color: '#e9ecef' } } }, scales: { y: { beginAtZero: true, grid: { color: 'rgba(255,255,255,0.05)' } }, x: { grid: { color: 'rgba(255,255,255,0.05)' } } } }
                    });
                } catch(e) { alert('查询失败: ' + e.message); }
            });
        }
    </script>
</body>
</html>
