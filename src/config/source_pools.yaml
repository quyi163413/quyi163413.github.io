# src/config/source_pools.yaml
# 源池配置文件

# 源池配置
source_pools:
  # 主源池 - 日常抓取
  main:
    enabled: true
    urls:
      - "https://raw.githubusercontent.com/iptv-org/iptv/master/streams/cn.m3u"
      - "https://iptv-org.github.io/iptv/index.m3u"
      - "https://raw.githubusercontent.com/zzgpy1/iptv-api/master/output/result.txt"
    interval_hours: 6
    priority: 1
  
  # 备用源池 - 低频抓取
  backup:
    enabled: true
    urls:
      - "https://raw.githubusercontent.com/vbskycn/iptv/master/tv/iptv4.txt"
      - "https://raw.githubusercontent.com/dogwalkerg/IPTV-collect-tv-txt/main/live.txt"
    interval_hours: 24
    priority: 2
  
  # 特殊源池 - 用户自定义
  custom:
    enabled: true
    urls:
      - "https://tv.19860519.xyz/abc123"
    interval_hours: 12
    priority: 3

# 候选版配置
candidate:
  # 观察期（小时）
  observation_hours: 24
  # 最少成功次数
  min_success_count: 10
  # 最低成功率（0.0-1.0）
  min_success_rate: 0.8
  # 最大平均延迟（毫秒）
  max_avg_latency: 2000
  # 检查间隔（小时）
  check_interval_hours: 1

# 稳定版配置
stable:
  # 是否自动更新
  auto_update: true
  # 最大失败次数（超过后标记为降级）
  max_fail_before_degrade: 3
  # 质量检查间隔（小时）
  quality_check_interval_hours: 24
  # 是否自动替换失效源
  auto_replace: true

# 固定源配置（用户指定的优质源）
fixed_sources:
