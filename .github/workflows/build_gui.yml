name: Build GUI Exe and Release

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Upgrade pip and install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir PyQt5
          pip install --no-cache-dir pyinstaller
          pip install -r requirements.txt

      - name: Verify PyQt5 installed
        run: |
          python -c "import PyQt5; print('PyQt5 installed')"

      - name: Clean and rebuild gui directory with correct __init__.py
        run: |
          Remove-Item -Path gui -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path gui
          New-Item -ItemType Directory -Force -Path gui/resources
          New-Item -ItemType Directory -Force -Path gui/styles
          Set-Content -Path gui/__init__.py -Value "# gui package"
          Set-Content -Path gui/resources/__init__.py -Value "# placeholder"
          Set-Content -Path gui/styles/dark_theme.qss -Value "/* placeholder */"

      - name: Build with PyInstaller (onedir)
        run: |
          pyinstaller --clean --onedir --windowed `
            --add-data "gui;gui" `
            --add-data "gui/styles;styles" `
            --add-data "gui/resources;resources" `
            --collect-all PyQt5 `
            --collect-all src `
            --collect-all gui `
            --hidden-import PyQt5 `
            --hidden-import PyQt5.QtCore `
            --hidden-import PyQt5.QtGui `
            --hidden-import PyQt5.QtWidgets `
            --hidden-import src `
            --name "IPTV_Collector" `
            gui/main.py

      - name: Copy config files to dist
        run: |
          # 确保目标目录存在
          New-Item -ItemType Directory -Force -Path dist/IPTV_Collector
          # 复制配置文件（如果存在）
          if (Test-Path demo.txt) { Copy-Item -Path demo.txt -Destination dist/IPTV_Collector/ -Force }
          if (Test-Path alias.txt) { Copy-Item -Path alias.txt -Destination dist/IPTV_Collector/ -Force }
          if (Test-Path blacklist.txt) { Copy-Item -Path blacklist.txt -Destination dist/IPTV_Collector/ -Force }
          if (Test-Path fixed_sources.py) { Copy-Item -Path fixed_sources.py -Destination dist/IPTV_Collector/ -Force }
          # 创建默认 demo.txt（如果不存在）
          if (-not (Test-Path dist/IPTV_Collector/demo.txt)) {
            Set-Content -Path dist/IPTV_Collector/demo.txt -Value "# 默认 demo 列表`n央视,#genre#`nCCTV-1`nCCTV-2`nCCTV-3"
          }

      - name: Compress output folder to zip
        run: |
          Compress-Archive -Path dist/IPTV_Collector/* -DestinationPath dist/IPTV_Collector_Windows_x64.zip -Force

      - name: Upload zip to Release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: dist/IPTV_Collector_Windows_x64.zip
          asset_name: IPTV_Collector_Windows_x64.zip
          tag: ${{ github.ref_name }}
          overwrite: true
