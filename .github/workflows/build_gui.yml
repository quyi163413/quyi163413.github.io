name: 构建并发布 GUI 桌面版

on:
  push:
    tags:
      - 'v*'   # 当推送 v1.0, v2.0 等标签时触发
  workflow_dispatch:   # 允许手动触发

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 设置 Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements_gui.txt
        pip install pyinstaller

    - name: 打包为 exe
      run: |
        pyinstaller --onefile --windowed --name "IPTV_Manager" --add-data "src;src" --add-data "output;output" --add-data "alias.txt;." --add-data "blacklist.txt;." --add-data "demo.txt;." gui_main.py

    - name: 上传到 Releases
      uses: softprops/action-gh-release@v1
      with:
        files: dist/IPTV_Manager.exe
        tag_name: ${{ github.ref_name }}
        name: "IPTV 管理工具 ${{ github.ref_name }}"
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
