name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0'

      - name: Create android directory if not exists
        run: mkdir -p android/app/src/main/java/com/iptv/player android/app/src/main/res android/app/src/main/assets android/gradle/wrapper

      - name: Generate Gradle Wrapper (if missing)
        run: |
          cd android
          if [ ! -f gradlew ]; then
            gradle wrapper --gradle-version 8.2
            chmod +x gradlew
          fi
        continue-on-error: true

      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew
        continue-on-error: true

      - name: Build APK
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon
        env:
          # 使用 debug 构建以避免签名问题（如需发布请配置签名）
          # 若想生成 debug APK，将 assembleRelease 改为 assembleDebug
          ANDROID_HOME: ${{ env.ANDROID_HOME }}

      - name: Upload APK artifact (debug)
        uses: actions/upload-artifact@v4
        with:
          name: IPTV-Player-Debug
          path: android/app/build/outputs/apk/debug/*.apk
        continue-on-error: true

      - name: Upload APK artifact (release)
        uses: actions/upload-artifact@v4
        with:
          name: IPTV-Player-Release
          path: android/app/build/outputs/apk/release/*.apk
        continue-on-error: true
